name: Windows Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Test NSIS
      run: makensis.exe /VERSION
    - name: Web Request
      run: Invoke-WebRequest  https://matthewwellings.com/github-runner -OutFile .\test
